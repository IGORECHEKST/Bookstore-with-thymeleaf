<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shopping Basket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2>Your Shopping Basket</h2>
    <table class="table table-bordered mt-3 bg-white shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Book Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${item.bookName}"></td>
            <td th:text="${item.price}"></td>
            <td th:text="${item.quantity}"></td>
            <td>
                <form th:action="@{/basket/remove}" method="post">
                    <input type="hidden" name="bookName" th:value="${item.bookName}">
                    <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="mt-3">
        <a th:href="@{/books}" class="btn btn-secondary">Continue Shopping</a>
        <a th:if="${not #lists.isEmpty(items)}" th:href="@{/orders/create}" class="btn btn-success">Checkout</a>
    </div>
</div>
</body>
</html>
