<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{basket.title})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="content-box shadow-md">
                    <h2 class="mb-4 text-primary d-flex align-items-center gap-2">
                        <i class="bi bi-cart3"></i>
                        <span th:text="#{basket.header}">Your Shopping Basket</span>
                    </h2>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th th:text="#{book.name}">Book Name</th>
                                <th th:text="#{book.price}">Price</th>
                                <th th:text="#{basket.quantity}">Quantity</th>
                                <th class="text-end" th:text="#{common.actions}">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(items)}">
                                <td colspan="4" class="text-center py-5 text-muted">
                                    <i class="bi bi-cart-x fs-1 d-block mb-3 text-secondary"></i>
                                    <span th:text="#{basket.empty}">Your basket is empty.</span>
                                </td>
                            </tr>
                            <tr th:each="item : ${items}">
                                <td class="fw-semibold text-dark">
                                    <i class="bi bi-book me-2 text-muted"></i>
                                    <span th:text="${item.bookName}"></span>
                                </td>
                                <td class="fw-semibold text-success" th:text="${item.price} + ' ₴'"></td>
                                <td>
                                    <span class="badge bg-light text-dark border px-3 py-2 fs-6" th:text="${item.quantity}"></span>
                                </td>
                                <td class="text-end">
                                    <form th:action="@{/basket/remove}" method="post" class="m-0">
                                        <input type="hidden" name="bookName" th:value="${item.bookName}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-1">
                                            <i class="bi bi-trash"></i> <span th:text="#{basket.remove}">Remove</span>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                        <a th:href="@{/books}" class="btn btn-secondary" th:text="#{basket.continue}">Continue Shopping</a>
                        <a th:if="${not #lists.isEmpty(items)}" th:href="@{/orders/checkout}" class="btn btn-success d-inline-flex align-items-center gap-2">
                            <i class="bi bi-check-circle"></i> <span th:text="#{basket.checkout}">Checkout</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
