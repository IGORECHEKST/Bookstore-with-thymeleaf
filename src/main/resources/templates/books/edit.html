<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{book.edit.title})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="content-box shadow-md">
                    <h2 class="mb-4 text-primary" th:text="#{book.edit.title}">Edit Book</h2>

                    <form th:action="@{/books/edit/{originalName}(originalName=${originalName})}" th:object="${bookDTO}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.name}">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.author}">Author</label>
                            <input type="text" th:field="*{author}" class="form-control" th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.genre}">Genre</label>
                            <input type="text" th:field="*{genre}" class="form-control" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.price}">Price</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.language}">Language</label>
                            <select th:field="*{language}" class="form-select">
                                <option th:each="lang : ${T(com.epam.rd.autocode.spring.project.model.enums.Language).values()}"
                                        th:value="${lang}" th:text="${lang}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.publicationDate}">Publication Date</label>
                            <input type="date" th:field="*{publicationDate}" class="form-control" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.pages}">Pages</label>
                            <input type="number" th:field="*{pages}" class="form-control" th:classappend="${#fields.hasErrors('pages')} ? 'is-invalid'" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('pages')}" th:errors="*{pages}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.ageGroup}">Age Group</label>
                            <select th:field="*{ageGroup}" class="form-select">
                                <option th:each="age : ${T(com.epam.rd.autocode.spring.project.model.enums.AgeGroup).values()}"
                                        th:value="${age}" th:text="${age}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{book.characteristics}">Characteristics</label>
                            <input type="text" th:field="*{characteristics}" class="form-control" />
                        </div>

                        <div class="mb-4">
                            <label class="form-label" th:text="#{book.description}">Description</label>
                            <textarea rows="4" th:field="*{description}" class="form-control"></textarea>
                        </div>

                        <div class="d-flex justify-content-between gap-2">
                            <a th:href="@{/books/view/{name}(name=${originalName})}" class="btn btn-secondary px-4" th:text="#{common.cancel}">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4" th:text="#{common.save}">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
