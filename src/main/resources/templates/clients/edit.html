<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{common.edit})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="content-box shadow-md">
                    <h2 class="mb-4 text-primary" th:text="#{common.edit}">Edit Profile</h2>

                    <form th:action="@{/clients/edit/{email}(email=${email})}" th:object="${clientDTO}" method="post">
                        <!-- Hidden fields -->
                        <input type="hidden" th:field="*{email}" />
                        <input type="hidden" th:field="*{password}" />

                        <div class="mb-3">
                            <label class="form-label" th:text="#{client.name}">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" th:text="#{client.balance}">Balance</label>
                            <input type="number" step="0.01" th:field="*{balance}" class="form-control" th:classappend="${#fields.hasErrors('balance')} ? 'is-invalid'" />
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('balance')}" th:errors="*{balance}"></div>
                        </div>

                        <div class="d-flex justify-content-between gap-2">
                            <a th:href="@{/clients/view/{email}(email=${email})}" class="btn btn-secondary px-4" th:text="#{common.cancel}">Cancel</a>
                            <button type="submit" class="btn btn-success px-4" th:text="#{common.save}">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
