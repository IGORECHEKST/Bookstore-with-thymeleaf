<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: header-css(#{nav.clients})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="content-box">
            <h2 class="text-primary mb-4" th:text="#{nav.clients}">Manage Clients</h2>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th th:text="#{client.name}">Name</th>
                        <th th:text="#{client.email}">Email</th>
                        <th class="text-end" th:text="#{common.actions}">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="client : ${clients}">
                        <td class="fw-semibold text-dark">
                            <i class="bi bi-person-fill text-muted me-2"></i>
                            <span th:text="${client.name}">Client Name</span>
                        </td>
                        <td th:text="${client.email}">email@example.com</td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-2">
                                <a th:href="@{/clients/view/{email}(email=${client.email})}" class="btn btn-sm btn-outline-primary" th:text="#{common.view}">View</a>
                                <a th:href="@{/clients/edit/{email}(email=${client.email})}" class="btn btn-sm btn-warning text-dark fw-semibold" th:text="#{common.edit}">Edit</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clients)}">
                        <td colspan="3" class="text-center py-4 text-muted">No clients found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a th:href="@{/}" class="btn btn-outline-secondary" th:text="#{nav.home}">Back to Home</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
