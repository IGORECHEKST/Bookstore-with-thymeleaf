<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: header-css(#{common.view})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Status Bar (Employee visible only) -->
                <div sec:authorize="hasRole('EMPLOYEE')" class="alert mb-4 shadow-sm border d-flex justify-content-between align-items-center"
                     th:classappend="${isBlocked} ? 'alert-danger border-danger-subtle' : 'alert-light border-light-subtle'">
                    <div>
                        <i class="bi bi-shield-exclamation me-1" th:classappend="${isBlocked} ? 'text-danger' : 'text-success'"></i>
                        <span class="fw-semibold">Account Status:</span>
                        <span th:text="${isBlocked ? 'BLOCKED' : 'ACTIVE'}"
                              th:class="${isBlocked ? 'badge bg-danger ms-1' : 'badge bg-success ms-1'}"></span>
                    </div>

                    <form th:if="${!isBlocked}" th:action="@{/clients/block/{email}(email=${client.email})}" method="post" class="m-0">
                        <button type="submit" class="btn btn-danger btn-sm">Block Client</button>
                    </form>
                    <form th:if="${isBlocked}" th:action="@{/clients/unblock/{email}(email=${client.email})}" method="post" class="m-0">
                        <button type="submit" class="btn btn-success btn-sm">Unblock Client</button>
                    </form>
                </div>

                <div class="content-box profile-card shadow-lg">
                    <h2 class="mb-4 text-success border-bottom pb-3 d-flex justify-content-between align-items-center">
                        <span class="d-flex align-items-center gap-2">
                            <i class="bi bi-person-bounding-box"></i>
                            <span th:text="#{common.view}">Client Profile</span>
                        </span>
                        <span th:if="${isBlocked}" class="badge bg-danger" style="font-size: 0.55em;">BLOCKED</span>
                    </h2>

                    <div class="mb-3 d-flex flex-column gap-1">
                        <span class="form-label mb-0" th:text="#{client.name}">Name</span>
                        <h4 class="text-dark fw-bold" th:text="${client.name}">Name</h4>
                    </div>

                    <div class="mb-3 d-flex flex-column gap-1">
                        <span class="form-label mb-0" th:text="#{client.email}">Email</span>
                        <span class="text-secondary" th:text="${client.email}">Email</span>
                    </div>

                    <div class="mb-4 d-flex flex-column gap-1 p-3 bg-light rounded border">
                        <span class="form-label mb-0" th:text="#{client.balance}">Balance</span>
                        <span class="balance-amount text-success" th:text="${client.balance} + ' ₴'"></span>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top mt-4">
                        <div>
                            <a th:href="@{/clients}" sec:authorize="hasRole('EMPLOYEE')" class="btn btn-outline-secondary">
                                <i class="bi bi-chevron-left"></i> <span th:text="#{nav.clients}">Back to List</span>
                            </a>
                            <a th:href="@{/}" sec:authorize="hasRole('CLIENT')" class="btn btn-outline-secondary">
                                <i class="bi bi-house"></i> <span th:text="#{nav.home}">Back Home</span>
                            </a>
                        </div>

                        <div class="d-flex gap-2">
                            <!-- Edit Button -->
                            <a th:href="@{/clients/edit/{email}(email=${client.email})}"
                               class="btn btn-warning text-dark fw-semibold" th:text="#{common.edit}">Edit</a>

                            <!-- Delete Form -->
                            <form th:action="@{/clients/delete/{email}(email=${client.email})}" method="post" class="m-0"
                                  onsubmit="return confirm('Are you sure you want to delete this account?')">
                                <button type="submit" class="btn btn-outline-danger" th:text="#{common.delete}">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
