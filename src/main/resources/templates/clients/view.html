<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{common.view}">Client Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f8f9fa; }
        .container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .profile-header { color: #198754; border-bottom: 3px solid #198754; padding-bottom: 15px; margin-bottom: 25px; }
        .info-group { margin-bottom: 20px; font-size: 17px; display: flex; align-items: center; }
        .info-label { font-weight: bold; color: #495057; width: 140px; }
        .balance { color: #198754; font-weight: bold; font-size: 20px; }
        .btn-custom { padding: 10px 20px; border-radius: 6px; font-weight: 500; text-decoration: none; display: inline-block; transition: 0.3s; }
    </style>
</head>
<body>
<div class="container">

    <!-- Блок управления блокировкой (Виден только сотрудникам) -->
    <div sec:authorize="hasRole('EMPLOYEE')" class="alert mb-4 shadow-sm"
         th:classappend="${isBlocked} ? 'alert-danger' : 'alert-light border'">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <span class="fw-bold">Account Status:</span>
                <span th:text="${isBlocked ? 'BLOCKED' : 'ACTIVE'}"
                      th:class="${isBlocked ? 'text-danger fw-bold' : 'text-success'}"></span>
            </div>

            <form th:if="${!isBlocked}" th:action="@{/clients/block/{email}(email=${client.email})}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Block Client</button>
            </form>
            <form th:if="${isBlocked}" th:action="@{/clients/unblock/{email}(email=${client.email})}" method="post">
                <button type="submit" class="btn btn-success btn-sm">Unblock Client</button>
            </form>
        </div>
    </div>

    <h2 class="profile-header">
        <span th:text="#{common.view}">Client Profile</span>
        <!-- Красная метка для клиента, если он заблокирован -->
        <span th:if="${isBlocked}" class="badge bg-danger float-end" style="font-size: 0.5em;">BLOCKED</span>
    </h2>

    <div class="info-group">
        <span class="info-label" th:text="#{client.name} + ':'">Name:</span>
        <span th:text="${client.name}"></span>
    </div>
    <div class="info-group">
        <span class="info-label" th:text="#{client.email} + ':'">Email:</span>
        <span th:text="${client.email}"></span>
    </div>
    <div class="info-group">
        <span class="info-label" th:text="#{client.balance} + ':'">Balance:</span>
        <span class="balance" th:text="${client.balance} + ' ₴'"></span>
    </div>

    <hr class="my-4">

    <div class="d-flex justify-content-between align-items-center">
        <div>
            <!-- Навигация назад -->
            <a th:href="@{/clients}" sec:authorize="hasRole('EMPLOYEE')" class="btn btn-link text-decoration-none">
                ← <span th:text="#{nav.clients}">Back to List</span>
            </a>
            <a th:href="@{/}" sec:authorize="hasRole('CLIENT')" class="btn btn-link text-decoration-none">
                ← <span th:text="#{nav.home}">Back to Home</span>
            </a>
        </div>

        <div class="d-flex">
            <!-- Кнопка редактирования -->
            <a th:href="@{/clients/edit/{email}(email=${client.email})}"
               class="btn btn-warning me-2 fw-bold" th:text="#{common.edit}">Edit</a>

            <!-- Кнопка удаления -->
            <form th:action="@{/clients/delete/{email}(email=${client.email})}" method="post"
                  onsubmit="return confirm('Are you sure you want to delete this account?')">
                <button type="submit" class="btn btn-outline-danger" th:text="#{common.delete}">Delete</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
