<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{employee.title}">New Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0" th:text="#{employee.title}">New Employee</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/employees/add}" th:object="${employeeDTO}" method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label" th:text="#{employee.name}">Full Name</label>
                            <input type="text" th:field="*{name}" id="name"
                                   class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label" th:text="#{employee.email}">Email</label>
                            <input type="email" th:field="*{email}" id="email"
                                   class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label" th:text="#{employee.password}">Password</label>
                            <input type="password" th:field="*{password}" id="password"
                                   class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label" th:text="#{employee.phone}">Phone</label>
                            <input type="text" th:field="*{phone}" id="phone" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="birthDate" class="form-label" th:text="#{employee.birthDate}">Birth Date</label>
                            <input type="date" th:field="*{birthDate}" id="birthDate" class="form-control">
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/employees}" class="btn btn-secondary" th:text="#{common.cancel}">Cancel</a>
                            <button type="submit" class="btn btn-success" th:text="#{common.save}">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
