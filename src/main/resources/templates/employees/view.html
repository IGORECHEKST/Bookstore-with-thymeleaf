<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{common.view})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="content-box profile-card shadow-lg">
                    <h2 class="mb-4 text-info border-bottom pb-3 d-flex align-items-center gap-2">
                        <i class="bi bi-person-badge-fill"></i>
                        <span th:text="#{common.view}">Employee Profile</span>
                    </h2>

                    <table class="table table-borderless align-middle mb-4">
                        <tr>
                            <th scope="row" class="text-muted ps-0" style="width: 40%;" th:text="#{employee.name} + ':'">Name:</th>
                            <td th:text="${employee.name}" class="fw-bold text-dark"></td>
                        </tr>
                        <tr>
                            <th scope="row" class="text-muted ps-0" th:text="#{employee.email} + ':'">Email:</th>
                            <td th:text="${employee.email}"></td>
                        </tr>
                        <tr>
                            <th scope="row" class="text-muted ps-0" th:text="#{employee.phone} + ':'">Phone:</th>
                            <td th:text="${employee.phone != null ? employee.phone : '-'}"></td>
                        </tr>
                        <tr>
                            <th scope="row" class="text-muted ps-0" th:text="#{employee.birthDate} + ':'">Birth Date:</th>
                            <td th:text="${employee.birthDate != null ? #temporals.format(employee.birthDate, 'dd MMMM yyyy') : '-'}"></td>
                        </tr>
                    </table>

                    <div class="d-flex justify-content-between pt-3 border-top">
                        <a th:href="@{/}" class="btn btn-outline-secondary" th:text="#{nav.home}">Back Home</a>
                        <a th:href="@{/employees}" class="btn btn-primary" th:text="#{common.back}">Back to List</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
