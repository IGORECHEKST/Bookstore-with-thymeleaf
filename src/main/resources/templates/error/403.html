<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>403 - Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-warning">403</h1>
            <h3 class="mb-3">Access Restricted</h3>
            <p class="text-muted mb-4">
                Your account does not have sufficient permissions to view this page. This section is intended for library administration only.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/login}" class="btn btn-warning text-dark fw-bold">Login with another account</a>
                <button onclick="history.back()" class="btn btn-outline-secondary">Back</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
