<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{error.403.title})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper d-flex align-items-center">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="content-box shadow-lg py-5">
                    <h1 class="display-1 fw-bold text-warning mb-3">
                        <i class="bi bi-shield-slash"></i> 403
                    </h1>
                    <h3 class="mb-3" th:text="#{error.403.header}">Access Restricted</h3>
                    <p class="text-secondary mb-4 px-3" th:text="#{error.403.description}">
                        Your account does not have sufficient permissions to view this page. This section is intended for library administration only.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="history.back()" class="btn btn-secondary" th:text="#{error.back}">Back</button>
                        <a th:href="@{/login}" class="btn btn-warning text-dark fw-bold" th:text="#{error.403.login_other}">Login with another account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
