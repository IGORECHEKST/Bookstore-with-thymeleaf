<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{error.404.title})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper d-flex align-items-center">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="content-box shadow-lg py-5">
                    <h1 class="display-1 fw-bold text-danger mb-3">
                        <i class="bi bi-question-circle"></i> 404
                    </h1>
                    <h3 class="mb-3" th:text="#{error.404.header}">Oops! Page or object not found</h3>
                    <p class="text-secondary mb-4 px-3" th:text="#{error.404.description}">
                        Perhaps the book, employee, or order was deleted, or you entered the wrong address.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="history.back()" class="btn btn-secondary" th:text="#{error.back}">Back</button>
                        <a th:href="@{/}" class="btn btn-primary" th:text="#{nav.home}">Go to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
