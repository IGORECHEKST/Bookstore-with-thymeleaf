<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 fw-bold text-danger">404</h1>
            <h3 class="mb-3">Oops! Page or object not found</h3>
            <p class="text-muted mb-4">
                Perhaps the book, employee, or order was deleted, or you entered the wrong address.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <button onclick="history.back()" class="btn btn-outline-secondary">Back</button>
                <a th:href="@{/employees}" class="btn btn-primary">Home (Staff)</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
