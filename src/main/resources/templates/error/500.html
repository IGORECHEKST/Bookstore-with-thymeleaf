<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{error.500.title})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper d-flex align-items-center">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="content-box shadow-lg py-5">
                    <h1 class="display-1 fw-bold text-secondary mb-3">
                        <i class="bi bi-exclamation-octagon text-danger"></i> 500
                    </h1>
                    <h3 class="mb-3" th:text="#{error.500.header}">A server-side error occurred</h3>
                    <p class="text-secondary mb-4 px-3" th:text="#{error.500.description}">
                        Something went wrong while processing your request. We are already looking into this issue.
                    </p>

                    <div th:if="${message}" class="card text-start mb-4 bg-dark text-white font-monospace mx-auto" style="max-width: 600px;">
                        <div class="card-body p-3" style="font-size: 0.85rem; max-height: 200px; overflow-y: auto;">
                            <strong th:text="#{error.500.error_log}">Error log:</strong> <span th:text="${message}">Error text...</span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="history.back()" class="btn btn-secondary" th:text="#{error.back}">Back</button>
                        <a th:href="@{/}" class="btn btn-primary" th:text="#{error.500.return_safe}">Return to safe page</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
