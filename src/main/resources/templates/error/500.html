<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="display-1 fw-bold text-secondary">500</h1>
            <h3 class="mb-3">A server-side error occurred</h3>
            <p class="text-muted mb-4">
                Something went wrong while processing your request. We are already looking into this issue.
            </p>

            <div th:if="${message}" class="card text-start mb-4 bg-dark text-white font-monospace">
                <div class="card-body p-3" style="font-size: 0.85rem; max-height: 200px; overflow-y: auto;">
                    <strong>Error log:</strong> <span th:text="${message}">Error text...</span>
                </div>
            </div>

            <a th:href="@{/employees}" class="btn btn-secondary">Return to safe page</a>
        </div>
    </div>
</div>

</body>
</html>
