<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="header-css(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Book Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<!-- Header / Navigation Bar Fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg custom-navbar shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-book-half"></i>
            <span>BookStore</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books}">
                        <i class="bi bi-grid-3x3-gap-fill me-1"></i> <span th:text="#{nav.books}">Books</span>
                    </a>
                </li>

                <!-- Employee Specific Navigation -->
                <li sec:authorize="hasRole('EMPLOYEE')" class="nav-item">
                    <a class="nav-link" th:href="@{/clients}">
                        <i class="bi bi-people-fill me-1"></i> <span th:text="#{nav.clients}">Clients</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('EMPLOYEE')" class="nav-item">
                    <a class="nav-link" th:href="@{/employees}">
                        <i class="bi bi-person-badge-fill me-1"></i> <span th:text="#{nav.employees}">Employees</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('EMPLOYEE')" class="nav-item">
                    <a class="nav-link" th:href="@{/orders/employee/{email}(email=${#authentication.name})}">
                        <i class="bi bi-receipt-cutoff me-1"></i> <span th:text="#{nav.orders}">Orders</span>
                    </a>
                </li>

                <!-- Client Specific Navigation -->
                <li sec:authorize="hasRole('CLIENT')" class="nav-item">
                    <a class="nav-link" th:href="@{/orders/client/{email}(email=${#authentication.name})}">
                        <i class="bi bi-journal-check me-1"></i> <span th:text="#{nav.orders}">My Orders</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('CLIENT')" class="nav-item">
                    <a class="nav-link" th:href="@{/clients/view/{email}(email=${#authentication.name})}">
                        <i class="bi bi-person-circle me-1"></i> <span th:text="#{common.view}">My Profile</span>
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-3">
                <!-- Shopping Cart / Basket for Clients -->
                <a sec:authorize="hasRole('CLIENT')" th:href="@{/basket}" class="btn btn-outline-primary position-relative d-flex align-items-center gap-2">
                    <i class="bi bi-cart3"></i>
                    <span th:text="#{basket.title}">Basket</span>
                </a>

                <!-- Language Toggler -->
                <div class="d-flex gap-1 align-items-center">
                    <a th:href="@{''(lang='en')}" class="lang-badge" th:classappend="${#locale.language == 'en'} ? 'active'">EN</a>
                    <a th:href="@{''(lang='uk')}" class="lang-badge" th:classappend="${#locale.language == 'uk'} ? 'active'">UA</a>
                </div>

                <!-- User Account Info / Authentication -->
                <div class="d-flex align-items-center gap-2 border-start ps-3">
                    <div sec:authorize="!isAuthenticated()" class="d-flex gap-2">
                        <a th:href="@{/login}" class="btn btn-sm btn-outline-primary" th:text="#{nav.login}">Login</a>
                        <a th:href="@{/register}" class="btn btn-sm btn-primary" th:text="#{nav.register}">Register</a>
                    </div>

                    <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
                        <div class="text-end me-1 d-none d-md-block">
                            <div class="fw-semibold text-dark small" th:text="${#authentication.name}">user@example.com</div>
                            <div class="text-muted small" style="font-size: 0.75rem;">
                                <span sec:authorize="hasRole('EMPLOYEE')" class="badge bg-warning text-dark">Staff</span>
                                <span sec:authorize="hasRole('CLIENT')" class="badge bg-info text-white">Customer</span>
                            </div>
                        </div>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-danger" th:title="#{nav.logout}">
                                <i class="bi bi-box-arrow-right"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Footer Fragment -->
<footer th:fragment="footer" class="custom-footer mt-auto">
    <div class="container">
        <div class="row align-items-center justify-content-between">
            <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                <h5 class="text-white mb-2"><i class="bi bi-book-half me-2 text-primary"></i>BookStore</h5>
                <p class="mb-0 text-muted small">&copy; 2026 BookStore Inc. All rights reserved.</p>
            </div>
            <div class="col-md-6 text-center text-md-end">
                <div class="d-flex justify-content-center justify-content-md-end gap-3 mb-2">
                    <a href="#" class="text-muted"><i class="bi bi-facebook fs-5"></i></a>
                    <a href="#" class="text-muted"><i class="bi bi-twitter-x fs-5"></i></a>
                    <a href="#" class="text-muted"><i class="bi bi-instagram fs-5"></i></a>
                    <a href="#" class="text-muted"><i class="bi bi-github fs-5"></i></a>
                </div>
                <div class="small">
                    <a th:href="@{/books}" class="text-muted me-3" th:text="#{nav.books}">Books</a>
                    <a th:href="@{/}" class="text-muted" th:text="#{nav.home}">Home</a>
                </div>
            </div>
        </div>
    </div>
</footer>

<!-- JS Script Fragment -->
<div th:fragment="footer-js">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
