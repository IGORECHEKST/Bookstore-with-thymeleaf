<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.home}">Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f9; }
        .hero-section { background: white; padding: 50px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 50px; }
        .lang-link { text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 hero-section text-center">
            <div class="text-end mb-4">
                <a th:href="@{/(lang='en')}" class="lang-link">EN</a> |
                <a th:href="@{/(lang='uk')}" class="lang-link">UA</a>
            </div>

            <h1 class="display-4 mb-4" th:text="#{nav.home}">Welcome to Book Store</h1>

            <div class="d-grid gap-3 col-8 mx-auto mt-5">
                <!-- Общие ссылки -->
                <a th:href="@{/books}" class="btn btn-primary btn-lg" th:text="#{nav.books}">Books Catalog</a>

                <!-- Ссылки для сотрудников -->
                <div sec:authorize="hasRole('EMPLOYEE')" class="d-grid gap-2">
                    <a th:href="@{/clients}" class="btn btn-outline-success" th:text="#{nav.clients}">Manage Clients</a>
                    <a th:href="@{/employees}" class="btn btn-outline-success" th:text="#{nav.employees}">Manage Employees</a>
                    <a th:href="@{/orders/employee/me}" class="btn btn-outline-warning" th:text="#{nav.orders}">Assigned Orders</a>
                </div>

                <!-- Ссылки для клиентов -->
                <div sec:authorize="hasRole('CLIENT')" class="d-grid gap-2">
                    <a th:href="@{/orders/client/me}" class="btn btn-outline-info" th:text="#{nav.orders}">My Order History</a>
                    <a th:href="@{/clients/view/me}" class="btn btn-outline-primary" th:text="#{common.view}">My Profile</a>
                </div>

                <!-- Вход / Регистрация -->
                <div sec:authorize="!isAuthenticated()" class="mt-4">
                    <a th:href="@{/login}" class="btn btn-dark" th:text="#{nav.login}">Login</a>
                    <a th:href="@{/register}" class="btn btn-secondary" th:text="#{nav.register}">Register</a>
                </div>

                <!-- Выход -->
                <div sec:authorize="isAuthenticated()" class="mt-4 border-top pt-4">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-danger w-100" th:text="#{nav.logout}">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
