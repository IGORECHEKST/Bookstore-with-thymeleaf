<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f9; display: flex; align-items: center; min-height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="login-box">
        <div class="text-end mb-3">
            <a th:href="@{/login(lang='en')}" class="text-decoration-none">EN</a> |
            <a th:href="@{/login(lang='uk')}" class="text-decoration-none">UA</a>
        </div>

        <h2 class="text-center mb-4" th:text="#{login.title}">Login</h2>

        <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}">
            Invalid credentials.
        </div>

        <div th:if="${param.logout}" class="alert alert-success" th:text="#{login.logout}">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label" th:text="#{client.email}">Email</label>
                <input type="email" id="username" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label" th:text="#{client.password}">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3" th:text="#{login.button}">Login</button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/register}" class="text-muted" th:text="#{nav.register}">Register new account</a>
        </div>
    </div>
</div>
</body>
</html>
