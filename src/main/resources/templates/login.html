<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{login.title})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="content-box shadow-lg">
                    <h2 class="text-center mb-4" th:text="#{login.title}">Login</h2>

                    <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}">
                        Invalid credentials.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success" th:text="#{login.logout}">
                        You have been logged out.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label" th:text="#{client.email}">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="username" name="username" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label" th:text="#{client.password}">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3" th:text="#{login.button}">Login</button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/register}" class="fw-semibold text-decoration-none" th:text="#{nav.register}">Register new account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
