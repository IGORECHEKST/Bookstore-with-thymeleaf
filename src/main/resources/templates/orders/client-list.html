<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="#{nav.orders}">Order History</h2>
        <a th:href="@{/books}" class="btn btn-primary" th:text="#{nav.books}">Back to Store</a>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th th:text="#{book.publicationDate}">Date</th>
                    <th th:text="#{nav.books}">Books</th>
                    <th th:text="#{book.price}">Price</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order, stat : ${orders}">
                    <td th:text="${stat.count}"></td>
                    <!-- САМЫЙ БЕЗОПАСНЫЙ ВЫВОД ДАТЫ БЕЗ ДОП. МОДУЛЕЙ -->
                    <td th:text="${order.orderDate}"></td>
                    <td>
                        <div th:each="item : ${order.bookItems}" class="small">
                            <span th:text="${item.bookName}"></span> x<span th:text="${item.quantity}"></span>
                        </div>
                    </td>
                    <td class="fw-bold text-success" th:text="${order.price}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.employeeEmail != null ? 'bg-success' : 'bg-warning text-dark'}"
                              th:text="${order.employeeEmail != null ? 'CONFIRMED' : 'PENDING'}">
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
