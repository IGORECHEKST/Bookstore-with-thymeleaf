<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{nav.orders})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="content-box">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-primary mb-0" th:text="#{nav.orders}">Order History</h2>
                <a th:href="@{/books}" class="btn btn-outline-primary" th:text="#{nav.books}">Back to Store</a>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th style="width: 8%">#</th>
                        <th th:text="#{book.publicationDate}">Date</th>
                        <th th:text="#{nav.books}">Books</th>
                        <th th:text="#{book.price}">Price</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order, stat : ${orders}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${order.orderDate}"></td>
                        <td>
                            <div th:each="item : ${order.bookItems}" class="small text-secondary mb-1">
                                <i class="bi bi-book-fill text-muted me-1"></i>
                                <span class="fw-semibold text-dark" th:text="${item.bookName}"></span>
                                <span class="badge bg-light text-dark border">x<span th:text="${item.quantity}"></span></span>
                            </div>
                        </td>
                        <td class="fw-bold text-success" th:text="${order.price} + ' ₴'"></td>
                        <td>
                            <span class="badge px-3 py-2"
                                  th:classappend="${order.employeeEmail != null ? 'bg-success-subtle text-success border border-success-subtle' : 'bg-warning-subtle text-warning-emphasis border border-warning-subtle'}"
                                  th:text="${order.employeeEmail != null ? 'CONFIRMED' : 'PENDING'}">
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="5" class="text-center py-4 text-muted">No orders found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a th:href="@{/}" class="btn btn-outline-secondary" th:text="#{nav.home}">Back Home</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
