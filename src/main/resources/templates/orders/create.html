<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.orders}">Create Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0" th:text="#{nav.orders}">New Order</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/orders/create}" th:object="${orderDTO}" method="post">

                        <div class="mb-3">
                            <label for="clientEmail" class="form-label" th:text="#{client.email}">Client Email</label>
                            <input type="email" th:field="*{clientEmail}" id="clientEmail"
                                   class="form-control" th:classappend="${#fields.hasErrors('clientEmail')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('clientEmail')}" th:errors="*{clientEmail}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="employeeEmail" class="form-label" th:text="#{employee.email}">Employee Email</label>
                            <input type="email" th:field="*{employeeEmail}" id="employeeEmail"
                                   class="form-control" th:classappend="${#fields.hasErrors('employeeEmail')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('employeeEmail')}" th:errors="*{employeeEmail}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label" th:text="#{book.price}">Price</label>
                            <input type="number" step="0.01" th:field="*{price}" id="price"
                                   class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="card bg-layout border-secondary mb-3">
                            <div class="card-body">
                                <h6 class="card-title text-secondary" th:text="#{nav.books}">Book in order</h6>
                                <div class="mb-2">
                                    <label class="form-label small" th:text="#{book.name}">Book Name</label>
                                    <input type="text" name="bookItems[0].bookName" class="form-control form-control-sm" required>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small" th:text="#{validation.quantity.null}">Quantity</label>
                                    <input type="number" name="bookItems[0].quantity" class="form-control form-control-sm" value="1" min="1" required>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" onclick="history.back()" class="btn btn-secondary" th:text="#{common.back}">Back</button>
                            <button type="submit" class="btn btn-success" th:text="#{common.save}">Create</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
