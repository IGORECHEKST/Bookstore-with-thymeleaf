<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{nav.orders})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="content-box shadow-md">
                    <h2 class="mb-4 text-primary" th:text="#{order.create_for_client}">Create Order for Client</h2>

                    <form th:action="@{/orders/create}" th:object="${orderDTO}" method="post">
                        <div class="mb-3">
                            <label for="clientEmail" class="form-label" th:text="#{order.client_email}">Client Email</label>
                            <input type="email" th:field="*{clientEmail}" id="clientEmail"
                                   class="form-control" th:classappend="${#fields.hasErrors('clientEmail')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('clientEmail')}" th:errors="*{clientEmail}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="employeeEmail" class="form-label" th:text="#{order.employee_email}">Employee Email</label>
                            <input type="email" th:field="*{employeeEmail}" id="employeeEmail"
                                   class="form-control" th:classappend="${#fields.hasErrors('employeeEmail')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('employeeEmail')}" th:errors="*{employeeEmail}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label" th:text="#{book.price}">Price</label>
                            <input type="number" step="0.01" th:field="*{price}" id="price"
                                   class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="card bg-light border-secondary-subtle mb-4">
                            <div class="card-body">
                                <h6 class="card-title text-secondary fw-semibold mb-3" th:text="#{nav.books}">Book in order</h6>
                                <div class="mb-3">
                                    <label class="form-label small" th:text="#{book.name}">Book Name</label>
                                    <input type="text" name="bookItems[0].bookName" class="form-control" required>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label small" th:text="#{validation.quantity.null}">Quantity</label>
                                    <input type="number" name="bookItems[0].quantity" class="form-control" value="1" min="1" required>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between gap-2">
                            <button type="button" onclick="history.back()" class="btn btn-secondary px-4" th:text="#{common.back}">Back</button>
                            <button type="submit" class="btn btn-success px-4" th:text="#{common.save}">Create</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
