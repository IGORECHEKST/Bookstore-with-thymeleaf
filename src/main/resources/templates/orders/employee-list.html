<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css(#{nav.orders})}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="main-wrapper">
    <div class="container">
        <div class="content-box">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                <h2 class="text-primary mb-0" th:text="#{nav.orders}">Managed Orders</h2>
                <a th:href="@{/orders/create}" class="btn btn-success d-inline-flex align-items-center gap-2">
                    <i class="bi bi-plus-circle"></i> <span th:text="#{order.create_for_client}">Create Order for Client</span>
                </a>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th style="width: 5%">#</th>
                        <th th:text="#{nav.clients}">Client</th>
                        <th th:text="#{nav.books}">Books</th>
                        <th th:text="#{book.price}">Price</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order, stat : ${orders}">
                        <td th:text="${stat.count}"></td>
                        <td class="fw-semibold text-dark">
                            <i class="bi bi-person-fill text-muted me-1"></i>
                            <span th:text="${order.clientEmail}"></span>
                        </td>
                        <td>
                            <div th:each="item : ${order.bookItems}" class="small text-secondary mb-1">
                                <i class="bi bi-book-fill text-muted me-1"></i>
                                <span class="fw-semibold text-dark" th:text="${item.bookName}"></span>
                                <span class="badge bg-light text-dark border">x<span th:text="${item.quantity}"></span></span>
                            </div>
                        </td>
                        <td class="fw-bold text-success" th:text="${order.price} + ' ₴'"></td>
                        <td>
                            <span class="badge px-3 py-2"
                                  th:classappend="${order.employeeEmail != null ? 'bg-success-subtle text-success border border-success-subtle' : 'bg-warning-subtle text-warning-emphasis border border-warning-subtle'}"
                                  th:text="${order.employeeEmail != null ? 'CONFIRMED' : 'PENDING'}">
                            </span>
                        </td>
                        <td class="text-end">
                            <form th:if="${order.employeeEmail == null}"
                                  th:action="@{/orders/confirm/{id}(id=${order.id})}" method="post" class="m-0">
                                <button type="submit" class="btn btn-sm btn-outline-success d-inline-flex align-items-center gap-1">
                                    <i class="bi bi-check2"></i> Confirm
                                </button>
                            </form>
                            <span th:if="${order.employeeEmail != null}" class="text-muted small">
                                <i class="bi bi-person-check"></i> <span th:text="${order.employeeEmail}"></span>
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="6" class="text-center py-4 text-muted" th:text="#{error.404.message}">No orders found</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a th:href="@{/}" class="btn btn-outline-secondary" th:text="#{nav.home}">Back Home</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: footer-js}"></div>
</body>
</html>
