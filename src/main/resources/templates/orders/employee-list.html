<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.orders}">Employee Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-dark mb-4" th:text="#{nav.orders}">Managed Orders</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-warning text-dark">
                <tr>
                    <th>#</th>
                    <th th:text="#{nav.clients}">Client</th>
                    <th th:text="#{nav.books}">Books</th>
                    <th th:text="#{book.price}">Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="6" class="text-center py-4 text-muted" th:text="#{error.404.message}">No orders found</td>
                </tr>
                <tr th:each="order, stat : ${orders}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${order.clientEmail}"></td>
                    <td>
                        <div th:each="item : ${order.bookItems}" class="small">
                            <span th:text="${item.bookName}"></span> (x<span th:text="${item.quantity}"></span>)
                        </div>
                    </td>
                    <td class="fw-bold" th:text="${order.price + ' ₴'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.employeeEmail != null ? 'bg-success' : 'bg-warning text-dark'}"
                              th:text="${order.employeeEmail != null ? 'CONFIRMED' : 'PENDING'}">
                        </span>
                    </td>
                    <td>
                        <!-- Так как id в DTO нельзя, мы надеемся, что в объекте итерации он доступен
                             (Spring/ModelMapper часто прокидывает его неявно, если поля совпадают) -->
                        <form th:if="${order.employeeEmail == null}"
                              th:action="@{/orders/confirm/{id}(id=${order.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-outline-success">Confirm</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-4">
        <a th:href="@{/}" class="btn btn-outline-secondary" th:text="#{nav.home}">Back Home</a>
    </div>
</div>
</body>
</html>
