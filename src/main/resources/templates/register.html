<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{register.title}">Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f9; display: flex; align-items: center; min-height: 100vh; }
        .register-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="register-box my-5">
        <div class="text-end mb-3">
            <a th:href="@{/register(lang='en')}" class="text-decoration-none">EN</a> |
            <a th:href="@{/register(lang='uk')}" class="text-decoration-none">UA</a>
        </div>

        <h2 class="text-center mb-4" th:text="#{register.title}">Registration</h2>

        <div th:if="${param.success}" class="alert alert-success" th:text="#{register.success}">
            Success!
        </div>

        <form th:action="@{/register}" th:object="${clientDTO}" method="post">
            <div class="mb-3">
                <label for="name" class="form-label" th:text="#{client.name}">Name</label>
                <input type="text" id="name" th:field="*{name}" class="form-control"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label" th:text="#{client.email}">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label" th:text="#{client.password}">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label for="balance" class="form-label" th:text="#{client.balance}">Balance</label>
                <input type="number" step="0.01" id="balance" th:field="*{balance}" class="form-control"
                       th:classappend="${#fields.hasErrors('balance')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{balance}"></div>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-3" th:text="#{register.button}">Register</button>
        </form>

        <p class="text-center mt-4 mb-0">
            <span th:text="#{register.already_have_account}">Already have an account?</span>
            <a th:href="@{/login}" th:text="#{nav.login}">Login</a>
        </p>
    </div>
</div>
</body>
</html>
